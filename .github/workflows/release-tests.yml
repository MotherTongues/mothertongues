name: Run full matrix Tests before Releases
on:
  pull_request:
    branches: [ release ]
jobs:
  pre-release-matrix-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync
      - name: Run tests
        run: uv run python mothertongues/tests/run.py dev
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0 # fetch all commits/branches
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9
        with:
          python-version: "3.11"
      - name: Use Node.js 18
        uses: actions/setup-node@v7
        with:
          node-version: "18"
      - name: Install & Build UI
        run: |
          # The default config is for the monorepo, while this is for standalone
          cd mothertongues-UI && npm install && npx nx build mtd-mobile-ui --configuration=pydev
      - name: Install dependencies
        run: |
          uv sync --group docs
          uv pip install build twine
      - name: Build
        env:
          MTD_REQUIRE_UI_BUILD: "1"
        run: |
          uv build
      - name: Build and publish
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          uv run twine upload dist/*
      - name: Determine tag
        id: determine_tag
        run: |
          echo "TAG_VERSION=$(ls dist/mothertongues-*.tar.gz | sed -e 's/.*mothertongues-//' -e 's/.tar.gz.*//')" >> $GITHUB_OUTPUT
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.determine_tag.outputs.TAG_VERSION }}
          create_annotated_tag: true
      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
      - name: Setup git config for doc deploy
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Deploy docs with mike 🚀
        run: |
          uv run mkdocs build
          uv run mike deploy --push --update-aliases latest ${{ steps.tag_version.outputs.new_tag }} stable
